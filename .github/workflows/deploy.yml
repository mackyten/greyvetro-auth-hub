name: Deploy Auth Hub

on:
  push:
    branches: [main]
    paths:
      - helm/**
      - k8s/**

env:
  NAMESPACE: greyvetro

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 3.14.0

      - name: Configure AKS credentials
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
          creds: ${{ secrets.AKS_CREDENTIALS }}

      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply RBAC
        run: kubectl apply -f k8s/rbac/

      - name: Create secrets
        run: |
          kubectl create secret generic keycloak-db-credentials \
            --from-literal=password=${{ secrets.KC_DB_PASSWORD }} \
            --namespace=$NAMESPACE \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic keycloak-admin-credentials \
            --from-literal=admin-password=${{ secrets.KC_ADMIN_PASSWORD }} \
            --namespace=$NAMESPACE \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Install cert-manager
        run: |
          helm repo add jetstack https://charts.jetstack.io && helm repo update
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --set crds.enabled=true \
            --wait

      - name: Apply cert-manager issuers
        run: kubectl apply -f k8s/cert-manager/

      - name: Install CloudNativePG operator
        run: |
          helm repo add cnpg https://cloudnative-pg.github.io/charts && helm repo update
          helm upgrade --install cnpg cnpg/cloudnative-pg \
            --namespace cnpg-system \
            --create-namespace \
            --wait

      - name: Apply PostgreSQL cluster and pooler
        run: kubectl apply -f k8s/postgres/

      - name: Wait for PostgreSQL
        run: |
          kubectl wait cluster/keycloak-db \
            --for=condition=Ready \
            --timeout=300s \
            --namespace=$NAMESPACE

      - name: Deploy Keycloak
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami && helm repo update
          helm upgrade --install keycloak bitnami/keycloak \
            --namespace=$NAMESPACE \
            --values helm/values-dev.yaml \
            --wait \
            --timeout=10m

      - name: Apply ingress
        run: kubectl apply -f k8s/ingress/
