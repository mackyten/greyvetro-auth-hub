realm: greyvetro
enabled: true
displayName: Greyvetro
displayNameHtml: "<strong>Greyvetro</strong>"

# Require TLS for all requests outside localhost
sslRequired: external

# Disable self-registration — users are provisioned by admins only
registrationAllowed: false
registrationEmailAsUsername: true
loginWithEmailAllowed: true
duplicateEmailsAllowed: false
resetPasswordAllowed: true
editUsernameAllowed: false

# Token lifespans
accessTokenLifespan: 300           # 5 minutes
ssoSessionIdleTimeout: 1800        # 30 minutes idle
ssoSessionMaxLifespan: 36000       # 10 hours absolute max
refreshTokenMaxReuse: 0
revokeRefreshToken: true

# Password policy
passwordPolicy: >-
  length(12) and
  upperCase(1) and
  lowerCase(1) and
  digits(1) and
  specialChars(1) and
  notUsername and
  notEmail

# Brute-force protection
bruteForceProtected: true
permanentLockout: false
maxFailureWaitSeconds: 900
minimumQuickLoginWaitSeconds: 60
waitIncrementSeconds: 60
quickLoginCheckMilliSeconds: 1000
maxDeltaTimeSeconds: 43200
failureFactor: 5

# Localization
internationalizationEnabled: true
supportedLocales:
  - en
defaultLocale: en

# Themes — swap in custom theme names once branding assets are ready
loginTheme: keycloak
emailTheme: keycloak
accountTheme: keycloak
adminTheme: keycloak

# SMTP — values injected at deploy time via Keycloak admin UI or separate Config CLI run
smtpServer: {}

## ---------------------------------------------------------------------------
## CLIENTS
## ---------------------------------------------------------------------------
# All four app clients are confidential (Auth Code + PKCE).
# Using confidential over public so the backends can call the token introspection
# endpoint, which requires a client secret.
# DEV secrets are hardcoded here — safe for localhost only; never commit real secrets.
# ---------------------------------------------------------------------------
clients:
  # --- POS Core ---
  - clientId: pos-core
    name: Greyvetro POS Core
    enabled: true
    protocol: openid-connect
    publicClient: false                        # confidential — backend needs introspect
    clientAuthenticatorType: client-secret
    secret: dev-secret-pos-core
    standardFlowEnabled: true                  # Auth Code flow (browser login)
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: false
    attributes:
      pkce.code.challenge.method: S256
    redirectUris:
      - http://localhost:3002/*
    webOrigins:
      - http://localhost:3002
    defaultClientScopes:
      - web-origins
      - profile
      - roles
      - email

  # --- Admin Portal ---
  - clientId: admin-portal
    name: Greyvetro Admin Portal
    enabled: true
    protocol: openid-connect
    publicClient: false
    clientAuthenticatorType: client-secret
    secret: dev-secret-admin-portal
    standardFlowEnabled: true
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: false
    attributes:
      pkce.code.challenge.method: S256
    redirectUris:
      - http://localhost:3000/*
    webOrigins:
      - http://localhost:3000
    defaultClientScopes:
      - web-origins
      - profile
      - roles
      - email

  # --- EHR Access ---
  - clientId: ehr-access
    name: Greyvetro EHR Access
    enabled: true
    protocol: openid-connect
    publicClient: false
    clientAuthenticatorType: client-secret
    secret: dev-secret-ehr-access
    standardFlowEnabled: true
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: false
    attributes:
      pkce.code.challenge.method: S256
    redirectUris:
      - http://localhost:3001/*
    webOrigins:
      - http://localhost:3001
    defaultClientScopes:
      - web-origins
      - profile
      - roles
      - email

  # --- Studio ---
  - clientId: greyvetro-studio
    name: Greyvetro Studio
    enabled: true
    protocol: openid-connect
    publicClient: false                        # confidential — backend needs introspect
    clientAuthenticatorType: client-secret
    secret: dev-secret-greyvetro-studio
    standardFlowEnabled: true
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: false
    attributes:
      pkce.code.challenge.method: S256
    redirectUris:
      - http://localhost:3003/*
    webOrigins:
      - http://localhost:3003
    defaultClientScopes:
      - web-origins
      - profile
      - roles
      - email

  # --- Conversational Agent ---
  # Bearer-only in the long run (token exchange); registered as confidential for now
  # so it can be extended in Phase 6 without a new client registration.
  - clientId: conversational-agent
    name: Greyvetro Conversational Agent
    enabled: true
    protocol: openid-connect
    publicClient: false
    clientAuthenticatorType: client-secret
    secret: dev-secret-conv-agent
    standardFlowEnabled: false
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: false
    webOrigins:
      - http://localhost:3000
      - http://localhost:3001
      - http://localhost:3002

