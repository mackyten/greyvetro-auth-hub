apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: keycloak-db-pooler
  namespace: greyvetro
spec:
  cluster:
    name: keycloak-db
  instances: 1
  type: rw

  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "100"
      default_pool_size: "20"

  template:
    spec:
      containers:
        - name: pgbouncer
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
